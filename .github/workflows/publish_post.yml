name: Publish Blog Post from Issue
on:
  issues:
    types: [labeled]

jobs:
  publish_post:
    if: github.event.label.name == 'ready-to-publish'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Create issue body file
        shell: bash
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          echo "$ISSUE_BODY" > issue_body.txt

      - name: Generate Post
        run: python3 scripts/issue_to_markdown.py issue_body.txt

      - name: Create Pull Request
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="content/issue-${{ github.event.issue.number }}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b $BRANCH_NAME || git checkout $BRANCH_NAME
          git add _posts/ assets/images/hero/ assets/images/thumbnail/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "feat: new blog post from issue #${{ github.event.issue.number }}"
            git push origin $BRANCH_NAME --force
            
            if ! gh pr view $BRANCH_NAME > /dev/null 2>&1; then
              PR_URL=$(gh pr create --title "New Post: ${{ github.event.issue.title }}" --body "Automated PR created from issue #${{ github.event.issue.number }}. Closes #${{ github.event.issue.number }}." --base master --head $BRANCH_NAME)
              echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            else
              echo "PR already exists"
              echo "pr_url=$(gh pr view $BRANCH_NAME --json url -q .url)" >> $GITHUB_OUTPUT
            fi
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Update Issue
        if: steps.create_pr.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "🚀 Ein neuer Pull Request wurde erstellt: ${{ steps.create_pr.outputs.pr_url }}\n\nDas Label 'ready-to-publish' wurde entfernt, um Mehrfach-Generierungen zu vermeiden."
          gh issue edit ${{ github.event.issue.number }} --remove-label "ready-to-publish"
